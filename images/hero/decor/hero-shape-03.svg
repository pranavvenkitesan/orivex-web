<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">

  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="256" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2b8bfe"/>
      <stop offset="100%" stop-color="#60efff"/>
    </linearGradient>

    <!-- Grain -->
    <filter id="grain">
      <feTurbulence baseFrequency="0.6" numOctaves="5" seed="4"/>
    </filter>

    <!-- Mask (your shape) -->
    <mask id="shapeMask">
      <path d="M 120 136 L 120 176 L 40 256 L 0 256 L 0 216 L 80 136 Z 
               M 256 216 L 256 256 L 216 256 L 136 176 L 136 136 L 176 136 Z 
               M 120 80 L 120 120 L 80 120 L 0 40 L 0 0 L 40 0 Z 
               M 256 40 L 176 120 L 136 120 L 136 80 L 216 0 L 256 0 Z"
            fill="white"/>
    </mask>
  </defs>

  <!-- Gradient clipped to shape -->
  <g mask="url(#shapeMask)">
    <rect width="256" height="256" fill="url(#grad)"/>
  </g>

  <!-- Grain clipped to shape -->
  <g mask="url(#shapeMask)" style="mix-blend-mode: overlay;">
    <rect width="256" height="256" fill="gray" filter="url(#grain)" opacity="0.4"/>
  </g>

</svg>