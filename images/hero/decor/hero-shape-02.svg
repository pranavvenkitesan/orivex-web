<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">

<defs>

  <!-- Linear gradient -->
  <linearGradient id="grad" x1="200" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2b8bfe"/>
    <stop offset="100%" stop-color="#60efff"/>
  </linearGradient>

  <!-- Mask for the moon shape -->
  <mask id="moonMask" maskUnits="userSpaceOnUse">
    <path fill="white" d="M65 3c0-1.657-1.344-3.007-2.999-2.93a65 65 0 000 129.861C63.656 130.007 65 128.657 65 127V3zM197 65c1.657 0 3.007-1.344 2.931-2.999a64.989 64.989 0 00-18.969-42.963 64.995 64.995 0 00-70.836-14.09 64.992 64.992 0 00-35.178 35.178A64.998 64.998 0 0070.069 62C69.993 63.656 71.343 65 73 65h124zM135 197c0 1.657 1.344 3.007 2.999 2.931a64.983 64.983 0 0021.875-4.879 64.983 64.983 0 0035.178-35.178 64.989 64.989 0 000-49.748 64.98 64.98 0 00-35.178-35.178 64.993 64.993 0 00-21.875-4.879C136.344 69.993 135 71.343 135 73v124zM3 135c-1.657 0-3.007 1.344-2.93 2.999a64.994 64.994 0 0018.968 42.963A64.987 64.987 0 0065 200a64.992 64.992 0 0045.962-19.038 64.983 64.983 0 0014.09-21.088 64.983 64.983 0 004.879-21.875c.076-1.655-1.274-2.999-2.931-2.999H3z"/>
  </mask>

  <!-- Grain filter -->
  <filter id="grain">
    <feTurbulence baseFrequency="0.6" numOctaves="5" seed="4"/>
  </filter>

</defs>

<!-- Gradient inside moon shape -->
<g mask="url(#moonMask)">
  <rect width="200" height="200" fill="url(#grad)"/>
</g>

<!-- Grain overlay -->
<g mask="url(#moonMask)" style="mix-blend-mode:overlay">
  <rect width="200" height="200" fill="gray" filter="url(#grain)"/>
</g>

</svg>